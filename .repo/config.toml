[[mount]]
url_prefix = "/wasm_bundle/"
source = ".repo/generated/build-wasm/"

[[plugin]]
name = "build-wasm"
runner = "command"
command = ["python3", "./build.py", "--clean"]
trigger = "manual"

[[task]]
name = "build-wasm"
steps = ["build-wasm"]

[[policy]]
path = "docs/**"
GET = true
POST = true
PUT = true
DELETE = true

[[policy]]
path = "assets/**"
GET = true

[[policy]]
path = "cli/**"
GET = true

[[policy]]
path = "models/**"
GET = true

[[policy]]
path = "utils/**"
GET = true

[[policy]]
path = "workspace_fs/**"
GET = true

[[policy]]
path = "**/*.md"
GET = true
POST = false
PUT = true
DELETE = false

[[policy]]
path = "*.md"
GET = true
POST = false
PUT = true
DELETE = false
