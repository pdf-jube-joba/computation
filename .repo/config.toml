name = "computation"

[serve]
port = 3001
plugin_url_prefix = "/.plugin"
policy_url_prefix = "/.policy"
info_url_prefix = "/.info"

[[plugin]]
name = "build-wasm"
runner = "command"
command = ["node", "./plugins/mount_model/build.mjs", "--clean"]
allow = ["me"]
mount = "/wasm_bundle/"

[[plugin]]
name = "md-preview"
runner = "default"
allow = ["me"]
mount = "/md/"

[plugin.md_preview]
macro_path = "./macros.txt"

[[plugin.md_preview.enhance]]
name = "wasm_mount"
url = "{MOUNT_BUILD_WASM}mount.js"
entrypoint = "mountModel"

[ignore]
paths = [
  ".git",
  ".codex",
  "_wfs",
  "plugins",
  "macros.txt",
]

[[policy]]
path = "/"
GET = ["me"]

[[policy]]
path = "docs/"
GET = ["me"]
POST = ["me"]
PUT = ["me"]
DELETE = ["me"]

[[policy]]
path = "models/"
GET = ["me"]
POST = []
PUT = ["me"]
DELETE = []

[[policy]]
path = "viewer/"
GET = ["me"]

[[policy]]
path = "utils/"
GET = ["me"]

[[policy]]
path = "cli/"
GET = ["me"]

[[policy]]
path = "README.md"
GET = ["me"]
POST = []
PUT = ["me"]
DELETE = []

[[policy]]
path = "test.md"
GET = ["me"]
POST = []
PUT = ["me"]
DELETE = []
