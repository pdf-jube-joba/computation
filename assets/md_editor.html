<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="./md_editor.css">
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <label class="path-field">
        <span>PATH</span>
        <input id="path-input" type="text" placeholder="docs/index.md" spellcheck="false">
      </label>
      <div class="actions">
        <button id="load-button" type="button">Load</button>
        <button id="save-button" type="button">Save</button>
      </div>
    </header>

    <section class="statusbar">
      <div id="status-text">Ready.</div>
      <div class="status-note">Browser requests always use `user-identity: from_browser`.</div>
    </section>

    <section class="panes">
      <section class="pane">
        <h1>Preview</h1>
        <pre id="preview" class="surface"></pre>
      </section>
      <section class="pane">
        <h1>Editor</h1>
        <textarea id="editor" class="surface editor" spellcheck="false"></textarea>
      </section>
    </section>
  </main>

  <script type="module" src="./md_editor.js"></script>
</body>
</html>
