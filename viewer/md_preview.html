<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="./md_preview.css">
  <link rel="stylesheet" href="/md-preview-assets/vendor/katex/katex.min.css">
</head>
<body>
  <main class="app">
    <section class="statusbar">
      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        type="button"
        aria-controls="sidebar"
        aria-expanded="true"
      >
        Hide Navigation
      </button>
      <div class="status-label">PATH</div>
      <div id="path-text" class="status-path"></div>
    </section>

    <div class="workspace">
      <aside id="sidebar" class="sidebar-pane" aria-label="Navigation sidebar">
        <div class="sidebar-header">
          <h1>Navigation</h1>
          <button
            id="sidebar-close"
            class="sidebar-close"
            type="button"
            aria-label="Close navigation"
          >
            ×
          </button>
        </div>
        <nav id="navigation" class="surface navigation"></nav>
      </aside>

      <section class="pane preview-pane">
        <h1>Preview</h1>
        <div id="preview" class="surface"></div>
      </section>
    </div>

    <section class="statusbar">
      <div id="status-text">Loading ...</div>
    </section>
  </main>

  <script type="module" src="./md_preview.js"></script>
</body>
</html>
